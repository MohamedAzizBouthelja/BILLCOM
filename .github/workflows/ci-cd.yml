name: DevOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Étape 1 : Lint ──────────────────────────────────────────────────────
  lint-python:
    name: Lint Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint tools
        run: pip install flake8==7.1.1 black==24.8.0

      - name: Black — check formatting
        run: black --check --diff services/${{ matrix.service }}

      - name: Flake8 — style & error checks
        run: flake8 services/${{ matrix.service }}

  lint-frontend:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ── Étape 2 : Tests unitaires + coverage ───────────────────────────────
  test:
    name: Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-python
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service]
    # Pas de conteneur MySQL : les tests utilisent SQLite (comme en local),
    # DATABASE_URL écrase le défaut MySQL codé dans app/config.py.
    env:
      DATABASE_URL: sqlite:///./ci_test.db
      JWT_SECRET: ci-test-secret-key-not-for-production
      JWT_ALGORITHM: HS256
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest==8.3.2 pytest-cov==5.0.0 httpx==0.27.2

      - name: Run tests with coverage (seuil 70%)
        working-directory: services/${{ matrix.service }}
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/coverage.xml

  # ── Étape 3 : Scan de code (Bandit) ────────────────────────────────────
  security-scan:
    name: Security Scan - Bandit (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit==1.9.4

      - name: Run Bandit
        run: bandit -r services/${{ matrix.service }}/app

  # ── Étape 4 : Scan de dépendances ──────────────────────────────────────
  # Informatif pour l'instant : pip-audit trouve des CVE sur cryptography/
  # pyjwt/starlette qui ne se corrigent qu'en bumpant FastAPI (chantier séparé).
  # continue-on-error évite de bloquer la pipeline tant que ce n'est pas fait.
  dependency-scan:
    name: Dependency Scan - pip-audit (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit==2.10.1

      - name: Run pip-audit (informatif, ne bloque pas le build)
        continue-on-error: true
        run: pip-audit -r services/${{ matrix.service }}/requirements.txt

  dependency-scan-frontend:
    name: Dependency Scan - npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (informatif, ne bloque pas le build)
        continue-on-error: true
        run: npm audit --audit-level=moderate

  # ── Étape 5 : Build Docker (multi-stage) ───────────────────────────────
  # build + scan (étape 6) + push (étape 7) sont regroupés dans le même job :
  # une image construite dans un job GitHub Actions n'existe plus dans le job
  # suivant (VM isolée et jetable à chaque job), donc Trivy et le push doivent
  # réutiliser l'image construite ici, dans les mêmes steps.
  build:
    name: Build Docker Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint-frontend, test, security-scan]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            context: services/user-service
            port: 8001
          - service: product-service
            context: services/product-service
            port: 8002
          - service: order-service
            context: services/order-service
            port: 8003
          - service: frontend
            context: frontend
            port: 3000
    # MySQL éphémère pour le smoke test (étape 9) des 3 services Python.
    # Non utilisé par le frontend, mais un seul services: block s'applique à
    # toute la matrice - léger surcoût de démarrage, sans impact fonctionnel.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: smoketest
          MYSQL_DATABASE: smoketest_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -psmoketest"
          --health-interval=5s --health-timeout=5s --health-retries=10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: billcom-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # ── Étape 6 : Scan d'image (Trivy) ────────────────────────────────
      # --ignore-unfixed : ne bloque pas sur des CVE sans correctif upstream
      # disponible (vérifié en local : sans ce filtre, le scan resterait rouge
      # en permanence sur des CVE que personne ne peut corriger aujourd'hui).
      # --severity CRITICAL : bloque uniquement sur les failles critiques,
      # comme demandé. Les failles HIGH restent visibles dans les logs mais
      # ne bloquent pas le build.
      - name: Trivy vulnerability scan (report HIGH+CRITICAL)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --severity CRITICAL,HIGH --ignore-unfixed \
            billcom-${{ matrix.service }}:${{ github.sha }}

      - name: Trivy vulnerability scan (block on CRITICAL)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --severity CRITICAL --ignore-unfixed \
            --exit-code 1 billcom-${{ matrix.service }}:${{ github.sha }}

      # ── Étape 9 : Health check — smoke test du conteneur ──────────────
      # On démarre réellement l'image construite (comme le ferait
      # Kubernetes) et on vérifie que /health répond, au lieu de juste
      # vérifier que le build a réussi. --network host fonctionne ici car
      # les runners GitHub Actions sont sous Linux (support natif, contrairement
      # à Docker Desktop Windows/Mac) : le conteneur atteint le service MySQL
      # sur localhost:3306 directement.
      - name: Smoke test - start container and verify /health
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            docker run -d --name smoke-test --network host \
              billcom-${{ matrix.service }}:${{ github.sha }}
            HEALTH_URL="http://127.0.0.1:${{ matrix.port }}/"
          else
            docker run -d --name smoke-test --network host \
              -e DATABASE_URL="mysql+pymysql://root:smoketest@127.0.0.1:3306/smoketest_db" \
              -e JWT_SECRET="smoke-test-secret-not-for-production" \
              -e PYTHONPATH="/app" \
              billcom-${{ matrix.service }}:${{ github.sha }}
            HEALTH_URL="http://127.0.0.1:${{ matrix.port }}/health"
          fi

          echo "Waiting for container to become healthy..."
          STATUS="starting"
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' smoke-test 2>/dev/null || echo "starting")
            echo "  attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then break; fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "Container reported unhealthy"
              docker logs smoke-test
              exit 1
            fi
            sleep 3
          done

          if [ "$STATUS" != "healthy" ]; then
            echo "Container did not become healthy in time"
            docker logs smoke-test
            exit 1
          fi

          curl -f "$HEALTH_URL"

      - name: Clean up smoke test container
        if: always()
        run: docker rm -f smoke-test || true

      # ── Étape 7 : Push vers GitHub Container Registry ─────────────────
      # Seulement sur main (pas sur les PR) : on ne publie pas d'image pour
      # du code qui n'est pas encore mergé.
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name (contrainte GHCR)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: vars
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Tag and push image to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          IMAGE=ghcr.io/${{ steps.vars.outputs.owner_lc }}/billcom-${{ matrix.service }}
          docker tag billcom-${{ matrix.service }}:${{ github.sha }} $IMAGE:${{ github.sha }}
          docker tag billcom-${{ matrix.service }}:${{ github.sha }} $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

  # ── Étape 8 : Validation des manifests Kubernetes ──────────────────────
  # Un runner GitHub Actions cloud ne peut pas atteindre le Minikube local
  # (WSL2) sur lequel ce projet est réellement déployé (voir DEMARRAGE_RAPIDE_V2.md).
  # On valide donc que les manifests sont corrects (syntaxe + schéma Kubernetes)
  # sans tenter un vrai déploiement. Le déploiement réel reste une étape
  # manuelle sur la machine du développeur.
  validate-k8s:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manifests (kubeconform, hors-ligne, sans cluster)
        run: |
          docker run --rm -v ${{ github.workspace }}/k8s/base:/k8s \
            ghcr.io/yannh/kubeconform:latest -strict -summary /k8s
