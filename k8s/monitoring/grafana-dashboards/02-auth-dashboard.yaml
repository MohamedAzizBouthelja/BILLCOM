apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-auth
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Billcom"
data:
  auth.json: |
    {
      "annotations": {"list": [{"builtIn": 1,"datasource": {"type": "grafana","uid": "-- Grafana --"},"enable": true,"hide": true,"iconColor": "rgba(0, 211, 255, 1)","name": "Annotations & Alerts","type": "dashboard"}]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "schemaVersion": 38,
      "tags": ["billcom","auth","security"],
      "time": {"from": "now-3h","to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Billcom — Auth & Sécurité",
      "uid": "billcom-auth",
      "version": 0,
      "templating": {
        "list": [
          {"current": {},"hide": 0,"includeAll": false,"label": "Datasource","name": "datasource","options": [],"query": "prometheus","refresh": 1,"type": "datasource"}
        ]
      },
      "panels": [
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "green","mode": "fixed"},"thresholds": {"steps": [{"color": "green","value": null}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 4,"w": 6,"x": 0,"y": 0},
          "id": 1,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(auth_login_success_total{namespace=\"billcom\"}[1h]))","legendFormat": "Connexions réussies (1h)","refId": "A"}],
          "title": "Connexions réussies (1h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"},"thresholds": {"steps": [{"color": "green","value": null},{"color": "yellow","value": 5},{"color": "red","value": 20}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 4,"w": 6,"x": 6,"y": 0},
          "id": 2,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(auth_login_failure_total{namespace=\"billcom\"}[1h]))","legendFormat": "Échecs (1h)","refId": "A"}],
          "title": "Échecs de connexion (1h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"},"thresholds": {"steps": [{"color": "green","value": null},{"color": "red","value": 10}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 4,"w": 6,"x": 12,"y": 0},
          "id": 3,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(auth_login_failure_total{namespace=\"billcom\"}[5m]))","legendFormat": "Échecs (5m)","refId": "A"}],
          "title": "Risque Brute-Force (5m)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "blue","mode": "fixed"},"thresholds": {"steps": [{"color": "blue","value": null}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 4,"w": 6,"x": 18,"y": 0},
          "id": 4,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(auth_register_total{namespace=\"billcom\"}[1h]))","legendFormat": "Inscriptions (1h)","refId": "A"}],
          "title": "Inscriptions (1h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "ops"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 0,"y": 4},
          "id": 5,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(auth_login_success_total{namespace=\"billcom\"}[5m])) by (role)","legendFormat": "Succès — role:{{role}}","refId": "A"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(auth_register_total{namespace=\"billcom\"}[5m])) by (role)","legendFormat": "Inscription — role:{{role}}","refId": "B"}
          ],
          "title": "Connexions réussies & inscriptions par rôle",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "red","mode": "fixed"},"custom": {"lineWidth": 2,"fillOpacity": 20,"showPoints": "never"},"unit": "ops"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 12,"y": 4},
          "id": 6,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(auth_login_failure_total{namespace=\"billcom\"}[5m]))","legendFormat": "Échecs / sec","refId": "A"}],
          "title": "Taux d'échec de connexion",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "short"},"overrides": []},
          "gridPos": {"h": 8,"w": 24,"x": 0,"y": 12},
          "id": 7,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "right"}},
          "targets": [
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(auth_login_failure_total{namespace=\"billcom\"}[5m]))","legendFormat": "Échecs (fenêtre 5m glissante)","refId": "A"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "10","legendFormat": "Seuil alerte brute-force","refId": "B"}
          ],
          "title": "Détection Brute-Force — fenêtre glissante 5m",
          "type": "timeseries"
        }
      ]
    }
