apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-application
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Billcom"
data:
  application.json: |
    {
      "annotations": {"list": [{"builtIn": 1,"datasource": {"type": "grafana","uid": "-- Grafana --"},"enable": true,"hide": true,"iconColor": "rgba(0, 211, 255, 1)","name": "Annotations & Alerts","type": "dashboard"}]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "schemaVersion": 38,
      "tags": ["billcom","application"],
      "time": {"from": "now-1h","to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Billcom — Application",
      "uid": "billcom-application",
      "version": 0,
      "templating": {
        "list": [
          {
            "current": {},"hide": 0,"includeAll": false,"label": "Datasource",
            "name": "datasource","options": [],"query": "prometheus",
            "refresh": 1,"type": "datasource"
          },
          {
            "current": {},"datasource": {"type": "prometheus","uid": "${datasource}"},
            "definition": "label_values(http_request_duration_seconds_count{namespace=\"billcom\"}, job)",
            "hide": 0,"includeAll": true,"label": "Service","multi": true,
            "name": "service","query": "label_values(http_request_duration_seconds_count{namespace=\"billcom\"}, job)",
            "refresh": 2,"sort": 1,"type": "query"
          }
        ]
      },
      "panels": [
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"},"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null}]},"unit": "short","mappings": []},
            "overrides": []
          },
          "gridPos": {"h": 4,"w": 6,"x": 0,"y": 0},
          "id": 1,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(http_request_duration_seconds_count{namespace=\"billcom\",job=~\"$service\"}[1h]))","legendFormat": "Requêtes (1h)","refId": "A"}],
          "title": "Requêtes totales (1h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"},"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null},{"color": "yellow","value": 0.01},{"color": "red","value": 0.05}]},"unit": "percentunit","max": 1,"min": 0},
            "overrides": []
          },
          "gridPos": {"h": 4,"w": 6,"x": 6,"y": 0},
          "id": 2,
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(http_request_duration_seconds_count{namespace=\"billcom\",job=~\"$service\",status_code=~\"5..\"}[5m])) / sum(rate(http_request_duration_seconds_count{namespace=\"billcom\",job=~\"$service\"}[5m]))","legendFormat": "Taux d'erreur","refId": "A"}],
          "title": "Taux d'erreur 5xx",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"},"thresholds": {"mode": "absolute","steps": [{"color": "green","value": null},{"color": "yellow","value": 0.5},{"color": "red","value": 2}]},"unit": "s"},
            "overrides": []
          },
          "gridPos": {"h": 4,"w": 6,"x": 12,"y": 0},
          "id": 3,
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"billcom\",job=~\"$service\"}[5m])) by (le))","legendFormat": "P95","refId": "A"}],
          "title": "Latence P95",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"},"thresholds": {"mode": "absolute","steps": [{"color": "red","value": 0},{"color": "green","value": 1}]},"mappings": [{"options": {"0": {"text": "DOWN"},"1": {"text": "UP"}},"type": "value"}]},
            "overrides": []
          },
          "gridPos": {"h": 4,"w": 6,"x": 18,"y": 0},
          "id": 4,
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "horizontal","reduceOptions": {"calcs": ["lastNotNull"],"fields": "","values": false},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "up{namespace=\"billcom\",job=~\"$service\"}","legendFormat": "{{job}}","refId": "A"}],
          "title": "État des services",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 8,"w": 12,"x": 0,"y": 4},
          "id": 5,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(http_request_duration_seconds_count{namespace=\"billcom\",job=~\"$service\"}[5m])) by (job)","legendFormat": "{{job}}","refId": "A"}],
          "title": "Requêtes / seconde par service",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "s"},
            "overrides": []
          },
          "gridPos": {"h": 8,"w": 12,"x": 12,"y": 4},
          "id": 6,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"billcom\",job=~\"$service\"}[5m])) by (le, job))","legendFormat": "P50 {{job}}","refId": "A"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"billcom\",job=~\"$service\"}[5m])) by (le, job))","legendFormat": "P95 {{job}}","refId": "B"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"billcom\",job=~\"$service\"}[5m])) by (le, job))","legendFormat": "P99 {{job}}","refId": "C"}
          ],
          "title": "Latence P50 / P95 / P99",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 20,"showPoints": "never"},"unit": "percentunit","max": 1,"min": 0},
            "overrides": []
          },
          "gridPos": {"h": 8,"w": 12,"x": 0,"y": 12},
          "id": 7,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(http_request_duration_seconds_count{namespace=\"billcom\",job=~\"$service\",status_code=~\"5..\"}[5m])) by (job) / sum(rate(http_request_duration_seconds_count{namespace=\"billcom\",job=~\"$service\"}[5m])) by (job)","legendFormat": "{{job}}","refId": "A"}],
          "title": "Taux d'erreur 5xx par service",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 8,"w": 12,"x": 12,"y": 12},
          "id": 8,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(http_request_duration_seconds_count{namespace=\"billcom\",job=~\"$service\",status_code=~\"4..\"}[5m])) by (job, status_code)","legendFormat": "{{job}} {{status_code}}","refId": "A"}],
          "title": "Erreurs 4xx par service",
          "type": "timeseries"
        }
      ]
    }
