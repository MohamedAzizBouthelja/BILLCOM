apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-business
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Billcom"
data:
  business.json: |
    {
      "annotations": {"list": [{"builtIn": 1,"datasource": {"type": "grafana","uid": "-- Grafana --"},"enable": true,"hide": true,"iconColor": "rgba(0, 211, 255, 1)","name": "Annotations & Alerts","type": "dashboard"}]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "schemaVersion": 38,
      "tags": ["billcom","business","kpi"],
      "time": {"from": "now-24h","to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Billcom — Business KPIs",
      "uid": "billcom-business",
      "version": 0,
      "templating": {
        "list": [
          {"current": {},"hide": 0,"includeAll": false,"label": "Datasource","name": "datasource","options": [],"query": "prometheus","refresh": 1,"type": "datasource"}
        ]
      },
      "panels": [
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "blue","mode": "fixed"},"thresholds": {"steps": [{"color": "blue","value": null}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 4,"w": 6,"x": 0,"y": 0},
          "id": 1,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(orders_created_total{namespace=\"billcom\"}[24h]))","legendFormat": "Commandes (24h)","refId": "A"}],
          "title": "Commandes (dernières 24h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "green","mode": "fixed"},"thresholds": {"steps": [{"color": "green","value": null}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 4,"w": 6,"x": 6,"y": 0},
          "id": 2,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(orders_created_total{namespace=\"billcom\"}[1h]))","legendFormat": "Commandes (1h)","refId": "A"}],
          "title": "Commandes (dernière heure)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "orange","mode": "fixed"},"thresholds": {"steps": [{"color": "orange","value": null}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 4,"w": 6,"x": 12,"y": 0},
          "id": 3,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(product_views_total{namespace=\"billcom\"}[24h]))","legendFormat": "Vues produits (24h)","refId": "A"}],
          "title": "Vues produits (24h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"fixedColor": "purple","mode": "fixed"},"thresholds": {"steps": [{"color": "purple","value": null}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 4,"w": 6,"x": 18,"y": 0},
          "id": 4,
          "options": {"colorMode": "background","graphMode": "area","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(auth_register_total{namespace=\"billcom\"}[24h]))","legendFormat": "Nouveaux utilisateurs","refId": "A"}],
          "title": "Nouveaux utilisateurs (24h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 20,"showPoints": "auto"},"unit": "short"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 0,"y": 4},
          "id": 5,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(orders_created_total{namespace=\"billcom\"}[1h])) by (payment_method)","legendFormat": "{{payment_method}}","refId": "A"}],
          "title": "Commandes / heure par méthode de paiement",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"hideFrom": {"legend": false,"tooltip": false,"viz": false}},"unit": "short"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 12,"y": 4},
          "id": 6,
          "options": {"legend": {"displayMode": "list","placement": "right"},"pieType": "pie","tooltip": {"mode": "single","sort": "none"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(orders_created_total{namespace=\"billcom\"}[24h])) by (payment_method)","legendFormat": "{{payment_method}}","refId": "A"}],
          "title": "Répartition par méthode de paiement (24h)",
          "type": "piechart"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "short"},"overrides": []},
          "gridPos": {"h": 8,"w": 24,"x": 0,"y": 12},
          "id": 7,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "right"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "topk(10, sum(increase(product_views_total{namespace=\"billcom\"}[1h])) by (product_id, category))","legendFormat": "Produit {{product_id}} ({{category}})","refId": "A"}],
          "title": "Top 10 produits les plus consultés (fenêtre 1h glissante)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "short"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 0,"y": 20},
          "id": 8,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(increase(product_views_total{namespace=\"billcom\"}[1h])) by (category)","legendFormat": "{{category}}","refId": "A"}],
          "title": "Vues par catégorie / heure",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "short"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 12,"y": 20},
          "id": 9,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(auth_login_success_total{namespace=\"billcom\"}[5m])) by (role)","legendFormat": "Login — {{role}}","refId": "A"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(auth_register_total{namespace=\"billcom\"}[5m])) by (role)","legendFormat": "Inscription — {{role}}","refId": "B"}
          ],
          "title": "Activité utilisateurs (login + inscriptions)",
          "type": "timeseries"
        }
      ]
    }
