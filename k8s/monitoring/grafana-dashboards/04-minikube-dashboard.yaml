apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-minikube
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Billcom"
data:
  minikube.json: |
    {
      "annotations": {"list": [{"builtIn": 1,"datasource": {"type": "grafana","uid": "-- Grafana --"},"enable": true,"hide": true,"iconColor": "rgba(0, 211, 255, 1)","name": "Annotations & Alerts","type": "dashboard"}]},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "schemaVersion": 38,
      "tags": ["billcom","minikube","infra"],
      "time": {"from": "now-1h","to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Billcom — Minikube / Infra",
      "uid": "billcom-minikube",
      "version": 0,
      "templating": {
        "list": [
          {"current": {},"hide": 0,"includeAll": false,"label": "Datasource","name": "datasource","options": [],"query": "prometheus","refresh": 1,"type": "datasource"},
          {
            "current": {},"datasource": {"type": "prometheus","uid": "${datasource}"},
            "definition": "label_values(kube_pod_info, namespace)",
            "hide": 0,"includeAll": true,"label": "Namespace","multi": true,
            "name": "namespace","query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,"sort": 1,"type": "query"
          }
        ]
      },
      "panels": [
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"},"thresholds": {"steps": [{"color": "green","value": null},{"color": "yellow","value": 0.70},{"color": "red","value": 0.85}]},"unit": "percentunit","min": 0,"max": 1},"overrides": []},
          "gridPos": {"h": 5,"w": 6,"x": 0,"y": 0},
          "id": 1,
          "options": {"orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"showThresholdLabels": false,"showThresholdMarkers": true},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))","legendFormat": "CPU node","refId": "A"}],
          "title": "CPU Node",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"},"thresholds": {"steps": [{"color": "green","value": null},{"color": "yellow","value": 0.75},{"color": "red","value": 0.90}]},"unit": "percentunit","min": 0,"max": 1},"overrides": []},
          "gridPos": {"h": 5,"w": 6,"x": 6,"y": 0},
          "id": 2,
          "options": {"orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"showThresholdLabels": false,"showThresholdMarkers": true},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)","legendFormat": "RAM node","refId": "A"}],
          "title": "RAM Node",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"},"thresholds": {"steps": [{"color": "green","value": null},{"color": "yellow","value": 0.80},{"color": "red","value": 0.90}]},"unit": "percentunit","min": 0,"max": 1},"overrides": []},
          "gridPos": {"h": 5,"w": 6,"x": 12,"y": 0},
          "id": 3,
          "options": {"orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"showThresholdLabels": false,"showThresholdMarkers": true},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"})","legendFormat": "Disque /","refId": "A"}],
          "title": "Disque Node (/)",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"},"thresholds": {"steps": [{"color": "green","value": null}]},"unit": "short"},"overrides": []},
          "gridPos": {"h": 5,"w": 6,"x": 18,"y": 0},
          "id": 4,
          "options": {"colorMode": "background","graphMode": "none","justifyMode": "auto","orientation": "auto","reduceOptions": {"calcs": ["lastNotNull"]},"textMode": "auto"},
          "targets": [
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "count(kube_pod_info{namespace=~\"$namespace\"})","legendFormat": "Pods total","refId": "A"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "count(kube_pod_info{namespace=~\"$namespace\"}) - count(kube_pod_status_ready{condition=\"true\",namespace=~\"$namespace\"})","legendFormat": "Pods not ready","refId": "B"}
          ],
          "title": "Pods (total / not ready)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "percentunit"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 0,"y": 5},
          "id": 5,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\",container!=\"\"}[5m])) by (namespace)","legendFormat": "{{namespace}}","refId": "A"}],
          "title": "CPU par namespace (cores)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "decbytes"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 12,"y": 5},
          "id": 6,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [{"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(container_memory_working_set_bytes{namespace=~\"$namespace\",container!=\"\"}) by (namespace)","legendFormat": "{{namespace}}","refId": "A"}],
          "title": "RAM par namespace",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "percentunit"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 0,"y": 13},
          "id": 7,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))","legendFormat": "CPU total","refId": "A"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "avg(rate(node_cpu_seconds_total{mode=\"system\"}[5m]))","legendFormat": "System","refId": "B"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "avg(rate(node_cpu_seconds_total{mode=\"user\"}[5m]))","legendFormat": "User","refId": "C"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "avg(rate(node_cpu_seconds_total{mode=\"iowait\"}[5m]))","legendFormat": "IO Wait","refId": "D"}
          ],
          "title": "Détail CPU node (modes)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus","uid": "${datasource}"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"},"custom": {"lineWidth": 2,"fillOpacity": 10,"showPoints": "never"},"unit": "short"},"overrides": []},
          "gridPos": {"h": 8,"w": 12,"x": 12,"y": 13},
          "id": 8,
          "options": {"tooltip": {"mode": "multi","sort": "desc"},"legend": {"displayMode": "list","placement": "bottom"}},
          "targets": [
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\",phase=\"Running\"}) by (namespace)","legendFormat": "Running — {{namespace}}","refId": "A"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\",phase=\"Pending\"}) by (namespace)","legendFormat": "Pending — {{namespace}}","refId": "B"},
            {"datasource": {"type": "prometheus","uid": "${datasource}"},"expr": "sum(kube_pod_status_phase{namespace=~\"$namespace\",phase=\"Failed\"}) by (namespace)","legendFormat": "Failed — {{namespace}}","refId": "C"}
          ],
          "title": "État des pods par namespace",
          "type": "timeseries"
        }
      ]
    }
