# ServiceMonitor resources — tell Prometheus (kube-prometheus-stack) how to scrape
# each FastAPI service in the billcom namespace.
# The selector on Prometheus is set to {} (match all) in values-prometheus-stack.yaml.
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-service
  namespace: monitoring
  labels:
    app: user-service
    release: prometheus  # must match prometheusSelector in Helm values
spec:
  namespaceSelector:
    matchNames:
      - billcom
  selector:
    matchLabels:
      app: user-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s

