apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: billcom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8002"
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql 3306; do echo waiting for mysql; sleep 3; done']
      containers:
        - name: product-service
          image: billcom/product-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              value: mysql+pymysql://root:rootpassword@mysql:3306/product_db
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: billcom-secrets
                  key: jwt-secret
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: billcom-config
                  key: JWT_ALGORITHM
            - name: PORT
              value: "8002"
            - name: PYTHONPATH
              valueFrom:
                configMapKeyRef:
                  name: billcom-config
                  key: PYTHONPATH
          resources:
            requests:
              cpu: "150m"     # baseline : 0.15 vCPU garanti au pod
              memory: "128Mi"
            limits:
              cpu: "500m"     # max : 0.5 vCPU avant throttling
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: billcom
  labels:
    app: product-service
spec:
  selector:
    app: product-service
  ports:
    - name: http
      port: 8002
      targetPort: 8002
