apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: billcom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8003"
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql 3306; do echo waiting for mysql; sleep 3; done']
      containers:
        - name: order-service
          image: billcom/order-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              value: mysql+pymysql://root:rootpassword@mysql:3306/order_db
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: billcom-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: billcom-config
                  key: REDIS_PORT
            - name: PRODUCT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: billcom-config
                  key: PRODUCT_SERVICE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: billcom-secrets
                  key: jwt-secret
            - name: JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: billcom-config
                  key: JWT_ALGORITHM
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: billcom-secrets
                  key: stripe-secret-key
            - name: FRONTEND_URL
              value: "https://localhost:8443"
            - name: PORT
              value: "8003"
            - name: PYTHONPATH
              valueFrom:
                configMapKeyRef:
                  name: billcom-config
                  key: PYTHONPATH
          resources:
            requests:
              cpu: "150m"     # 0.15 vCPU garanti — HPA scale up si > 105m (70%)
              memory: "128Mi"
            limits:
              cpu: "500m"     # order-service : Stripe + Redis = plus gourmand
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: billcom
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 8003
      targetPort: 8003
