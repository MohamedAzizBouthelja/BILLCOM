apiVersion: v1
kind: Secret
metadata:
  name: billcom-secrets
  namespace: billcom
type: Opaque
stringData:
  mysql-root-password: rootpassword
  # Un utilisateur MySQL dédié par service, restreint à sa propre base
  # (user_db / product_db / order_db) — voir k8s/base/mysql-init-configmap.yaml.
  user-svc-password: userpass_k8s
  product-svc-password: productpass_k8s
  order-svc-password: orderpass_k8s
  # DATABASE_URL complète par service (référencée directement par les
  # Deployments applicatifs, au lieu d'identifiants root en clair dans le YAML).
  user-service-database-url: mysql+pymysql://user_svc:userpass_k8s@mysql:3306/user_db
  product-service-database-url: mysql+pymysql://product_svc:productpass_k8s@mysql:3306/product_db
  order-service-database-url: mysql+pymysql://order_svc:orderpass_k8s@mysql:3306/order_db
  jwt-secret: supersecretkeychangeit
  stripe-secret-key: sk_test_REPLACE_WITH_YOUR_STRIPE_KEY
