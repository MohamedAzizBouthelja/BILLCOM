worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    sendfile        on;
    keepalive_timeout 65;

    # WebSocket upgrade map (HTTP & WS support)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Docker internal DNS resolver — re-resolves service names every 10s
    # Required for load balancing across scaled replicas (docker-compose --scale)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth_limit:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
    # Dedicated, stricter zone for the login endpoint (brute-force protection).
    # Small burst + nodelay: excess requests are rejected (503) immediately
    # instead of being queued, so a credential-stuffing burst can't just wait it out.
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/s;

    # ── Upstreams ──────────────────────────────────────────────────────────
    # least_conn sends each new request to the replica with fewest active connections
    upstream user_service {
        least_conn;
        server user-service:8001;
        keepalive 16;
    }

    upstream product_service {
        least_conn;
        server product-service:8002;
        keepalive 16;
    }

    upstream order_service {
        least_conn;
        server order-service:8003;
        keepalive 16;
    }

    upstream frontend_app {
        server ecommerce-frontend:3000;
        keepalive 8;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────
    # Listens on an unprivileged port: the container runs as a non-root user
    # (securityContext), which cannot bind <1024. The public-facing 80/443
    # ports are restored by the Docker/K8s port mapping in front of this
    # container (docker-compose "80:8080"/"443:8443", K8s Service port 80/443
    # -> targetPort 8080/8443) — transparent to clients.
    server {
        listen 8080;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Gateway ──────────────────────────────────────────────────────
    server {
        listen 8443 ssl;
        server_name localhost;

        # SSL / TLS
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header X-XSS-Protection          "1; mode=block"                       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header X-Gateway                 "nginx-api-gateway"                   always;

        # Common proxy headers (HTTP + WebSocket)
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        # Explicit JWT forwarding — passes the Authorization: Bearer <token> header
        # sent by the React frontend to all downstream services
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # ── Login (brute-force protection) ── exact match, evaluated before the
        # prefix location below regardless of declaration order.
        location = /api/v1/users/login {
            limit_req zone=login_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://user_service;
        }

        # ── User Service (/api/v1/users/*) ──
        location /api/v1/users {
            limit_req zone=auth_limit burst=20 nodelay;
            proxy_pass http://user_service;
        }

        # ── Product Service (/api/v1/products/*) ──
        location /api/v1/products {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://product_service;
        }

        # ── Order Service (/api/v1/orders/*) ──
        location /api/v1/orders {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://order_service;
        }

        # ── Gateway health check ──
        location = /health {
            default_type application/json;
            return 200 '{"gateway":"healthy","timestamp":"$time_iso8601"}';
        }

        # ── Per-service health checks ──
        location = /health/users    { proxy_pass http://user_service/health;    }
        location = /health/products { proxy_pass http://product_service/health; }
        location = /health/orders   { proxy_pass http://order_service/health;   }

        # ── Prometheus metrics ──
        location = /metrics/users    { proxy_pass http://user_service/metrics;    }
        location = /metrics/products { proxy_pass http://product_service/metrics; }
        location = /metrics/orders   { proxy_pass http://order_service/metrics;   }

        # ── Frontend (catch-all) ──
        location / {
            proxy_pass http://frontend_app;
        }
    }
}
