version: '3.8'

services:
  # MySQL — une base de données isolée par service, chacune avec son propre
  # utilisateur restreint (voir db-init/01-databases.sql et 02-create-users.sh).
  mysql:
    image: mysql:8.0
    container_name: devops-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      USER_SVC_PASSWORD: userpass_dev
      PRODUCT_SVC_PASSWORD: productpass_dev
      ORDER_SVC_PASSWORD: orderpass_dev
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword", "--connect_timeout=5"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cache Redis 7
  redis:
    image: redis:7-alpine
    container_name: devops-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # User Service (FastAPI)
  # Scale with: docker-compose up --scale user-service=2
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://user_svc:userpass_dev@mysql:3306/user_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=supersecretkeychangeit
      - JWT_ALGORITHM=HS256
      - PORT=8001
      - PYTHONPATH=/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  # Product Service (FastAPI)
  # Scale with: docker-compose up --scale product-service=2
  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://product_svc:productpass_dev@mysql:3306/product_db
      - JWT_SECRET=supersecretkeychangeit
      - JWT_ALGORITHM=HS256
      - PORT=8002
      - PYTHONPATH=/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  # Order Service (FastAPI)
  # Scale with: docker-compose up --scale order-service=2
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://order_svc:orderpass_dev@mysql:3306/order_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PRODUCT_SERVICE_URL=http://product-service:8002
      - JWT_SECRET=supersecretkeychangeit
      - JWT_ALGORITHM=HS256
      - PORT=8003
      - PYTHONPATH=/app
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce-network

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce-frontend
    restart: always
    networks:
      - ecommerce-network

  # API Gateway (Nginx — single entry point, SSL/TLS, routing, WebSocket)
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "80:8080"
      - "443:8443"
    depends_on:
      - user-service
      - product-service
      - order-service
      - frontend
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    name: ecommerce-network
    driver: bridge

volumes:
  mysql-data:
  redis-data:
